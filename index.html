<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NEXUS_OS // System Desktop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;500;700;800&display=swap');

  :root{
    --bg:        #050a08;
    --bg-2:      #0a1410;
    --panel:     #0c1a14;
    --panel-2:   #0e2018;
    --border:    #14392a;
    --border-lt: #1d5238;
    --green:     #00ff8c;
    --green-dim: #0a8c52;
    --green-glow: rgba(0,255,140,0.45);
    --cyan:      #00d4ff;
    --amber:     #ffb800;
    --red:       #ff3860;
    --text:      #c8ffe4;
    --text-dim:  #5f9b80;
    --mono:      'JetBrains Mono', 'Share Tech Mono', monospace;
  }

  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg);
    font-family:var(--mono);
    color:var(--text);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ===================== BOOT SEQUENCE ===================== */
  #boot{
    position:fixed; inset:0; z-index:9999;
    background:#000;
    color:var(--green);
    font-size:13px;
    padding:30px 40px;
    line-height:1.55;
    white-space:pre-wrap;
    overflow:hidden;
  }
  #boot .cursor-blink{ animation:blink 1s steps(1) infinite; }
  #boot.hide{ display:none; }
  #boot-skip{
    position:absolute; bottom:20px; right:30px;
    color:var(--text-dim); font-size:11px;
    border:1px solid var(--border-lt); padding:6px 12px;
    cursor:pointer; background:transparent; font-family:var(--mono);
  }
  #boot-skip:hover{ color:var(--green); border-color:var(--green); }

  @keyframes blink{ 50%{ opacity:0; } }

  /* ===================== CRT / SCANLINE OVERLAY ===================== */
  #crt-overlay{
    position:fixed; inset:0; pointer-events:none; z-index:8000;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 1px,
        rgba(0,0,0,0.10) 2px,
        rgba(0,0,0,0.10) 3px
      );
    mix-blend-mode:multiply;
  }
  #crt-vignette{
    position:fixed; inset:0; pointer-events:none; z-index:7999;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
  }
  #crt-flicker{
    position:fixed; inset:0; pointer-events:none; z-index:8001;
    background:rgba(0,255,140,0.015);
    animation:flicker 6s infinite;
  }
  @keyframes flicker{
    0%,100%{ opacity:1; }
    50%{ opacity:0.4; }
    52%{ opacity:1; }
    78%{ opacity:0.7; }
    79%{ opacity:1; }
  }

  /* ===================== DESKTOP ===================== */
  #desktop{
    position:relative; width:100%; height:100%;
    background:
      radial-gradient(circle at 15% 10%, rgba(0,255,140,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(0,212,255,0.04), transparent 40%),
      linear-gradient(var(--bg), var(--bg));
    background-size: 100% 100%, 100% 100%, 28px 28px, 28px 28px;
  }
  #desktop::before{
    content:'';
    position:absolute; inset:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(0,255,140,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,140,0.035) 1px, transparent 1px);
    background-size:34px 34px;
  }

  /* top bar */
  #topbar{
    position:absolute; top:0; left:0; right:0; height:34px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 14px;
    background:linear-gradient(180deg, rgba(10,28,20,0.95), rgba(8,20,15,0.85));
    border-bottom:1px solid var(--border);
    font-size:11px; letter-spacing:0.5px; color:var(--text-dim);
    z-index:50;
  }
  #topbar .brand{ color:var(--green); font-weight:700; letter-spacing:2px; }
  #topbar .brand span{ color:var(--cyan); }
  #topbar .right{ display:flex; gap:18px; align-items:center; }
  #topbar .clock{ color:var(--green); }
  #topbar .pulse-dot{
    width:7px; height:7px; border-radius:50%; background:var(--green);
    display:inline-block; margin-right:5px; box-shadow:0 0 6px var(--green);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

  /* icons column */
  #icons{
    position:absolute; top:50px; right:18px;
    display:flex; flex-direction:column; gap:14px;
    z-index:40;
  }
  .icon-btn{
    width:84px; padding:10px 6px 8px;
    background:rgba(10,26,18,0.55);
    border:1px solid var(--border);
    color:var(--text);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    cursor:pointer; font-family:var(--mono);
    transition:border-color .15s, transform .1s, background .15s;
    text-align:center;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  .icon-btn .glyph{ font-size:22px; filter:drop-shadow(0 0 4px var(--green-glow)); }
  .icon-btn .label{ font-size:9.5px; letter-spacing:0.5px; color:var(--text-dim); line-height:1.2; }
  .icon-btn:hover{ border-color:var(--green); background:rgba(0,255,140,0.07); transform:translateX(-2px); }
  .icon-btn:hover .label{ color:var(--green); }
  .icon-btn:active{ transform:scale(0.96); }
  .icon-btn .key{
    position:absolute; top:2px; left:3px; font-size:8px; color:var(--text-dim); opacity:0.6;
  }

  /* bottom status bar */
  #statusbar{
    position:absolute; bottom:0; left:0; right:0; height:30px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 14px;
    background:linear-gradient(0deg, rgba(10,28,20,0.95), rgba(8,20,15,0.8));
    border-top:1px solid var(--border);
    font-size:10.5px; color:var(--text-dim);
    z-index:50;
  }
  #statusbar .stats{ display:flex; gap:16px; }
  #statusbar .bar-track{
    display:inline-block; width:56px; height:7px; border:1px solid var(--border-lt);
    vertical-align:middle; margin-left:5px; position:relative; overflow:hidden;
  }
  #statusbar .bar-fill{
    position:absolute; left:0; top:0; bottom:0; background:var(--green);
    box-shadow:0 0 4px var(--green-glow);
  }
  #statusbar .taskbar-wins{ display:flex; gap:6px; }
  .task-chip{
    border:1px solid var(--border-lt); padding:2px 9px; font-size:10px;
    color:var(--text-dim); cursor:pointer; background:rgba(0,255,140,0.05);
  }
  .task-chip:hover{ color:var(--green); border-color:var(--green); }
  .task-chip.active{ color:var(--green); border-color:var(--green); }

  /* boot log line on desktop (tickertape) */
  #ticker{
    position:absolute; top:34px; left:0; right:0; height:20px;
    background:rgba(0,0,0,0.35);
    border-bottom:1px solid var(--border);
    overflow:hidden; white-space:nowrap; z-index:30;
    font-size:10px; color:var(--text-dim);
  }
  #ticker-inner{
    display:inline-block; padding-left:100%;
    animation:ticker-scroll 38s linear infinite;
  }

  @keyframes ticker-scroll{
    from{ transform:translateX(0); }
    to{ transform:translateX(-100%); }
  }

  /* ===================== WINDOWS ===================== */
  .win{
    position:absolute;
    min-width:280px;
    background:rgba(8,18,14,0.97);
    border:1px solid var(--border-lt);
    box-shadow:0 0 0 1px rgba(0,0,0,0.4), 0 18px 50px rgba(0,0,0,0.6), 0 0 30px rgba(0,255,140,0.05);
    display:flex; flex-direction:column;
    z-index:100;
    backdrop-filter:blur(2px);
  }
  .win.focused{ border-color:var(--green); box-shadow:0 18px 50px rgba(0,0,0,0.6), 0 0 24px rgba(0,255,140,0.18); }
  .win.minimized{ display:none; }
  .win-head{
    height:32px; flex:0 0 32px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 4px 0 10px;
    background:linear-gradient(180deg, rgba(0,255,140,0.10), rgba(0,255,140,0.02));
    border-bottom:1px solid var(--border);
    cursor:move; user-select:none;
    font-size:11px; letter-spacing:0.5px; color:var(--green-dim);
  }
  .win.focused .win-head{ color:var(--green); }
  .win-head .title{ display:flex; align-items:center; gap:7px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .win-head .ctrls{ display:flex; gap:4px; }
  .win-head button{
    width:20px; height:20px; background:transparent; border:1px solid var(--border-lt);
    color:var(--text-dim); font-family:var(--mono); font-size:11px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .win-head button:hover{ border-color:var(--green); color:var(--green); }
  .win-head button.close-btn:hover{ border-color:var(--red); color:var(--red); }

  .win-body{
    flex:1; overflow:auto; padding:14px;
    font-size:12.5px; line-height:1.55;
  }
  .win-resize{
    position:absolute; right:0; bottom:0; width:16px; height:16px;
    cursor:nwse-resize;
    background:linear-gradient(135deg, transparent 50%, var(--border-lt) 50%);
  }

  /* scrollbars */
  .win-body::-webkit-scrollbar{ width:8px; }
  .win-body::-webkit-scrollbar-track{ background:var(--bg-2); }
  .win-body::-webkit-scrollbar-thumb{ background:var(--border-lt); }
  .win-body::-webkit-scrollbar-thumb:hover{ background:var(--green-dim); }

  /* generic UI bits reused across apps */
  .btn{
    font-family:var(--mono); background:rgba(0,255,140,0.06);
    border:1px solid var(--border-lt); color:var(--green);
    padding:7px 14px; font-size:11.5px; cursor:pointer; letter-spacing:0.3px;
    transition:background .15s, border-color .15s;
  }
  .btn:hover{ background:rgba(0,255,140,0.15); border-color:var(--green); }
  .btn:active{ transform:translateY(1px); }
  .btn.danger{ color:var(--red); }
  .btn.danger:hover{ background:rgba(255,56,96,0.12); border-color:var(--red); }
  .btn.amber{ color:var(--amber); }
  .btn.amber:hover{ background:rgba(255,184,0,0.12); border-color:var(--amber); }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; }

  .field{
    width:100%; background:var(--bg-2); border:1px solid var(--border-lt);
    color:var(--text); font-family:var(--mono); font-size:12px; padding:8px 10px;
    outline:none;
  }
  .field:focus{ border-color:var(--green); }

  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .col{ display:flex; flex-direction:column; gap:8px; }
  .label-sm{ font-size:10px; color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; }
  .divider{ height:1px; background:var(--border); margin:10px 0; }
  .mono-block{
    background:var(--bg-2); border:1px solid var(--border);
    padding:10px; white-space:pre-wrap; font-size:11.5px; color:var(--green-dim);
    max-height:220px; overflow:auto;
  }
  .progress{
    height:10px; background:var(--bg-2); border:1px solid var(--border-lt); position:relative; overflow:hidden;
  }
  .progress > div{ height:100%; background:var(--green); box-shadow:0 0 8px var(--green-glow); transition:width .2s; }
  .blinking-cursor{ display:inline-block; width:7px; height:13px; background:var(--green); animation:blink 1s steps(1) infinite; vertical-align:middle; }
  .tag{ font-size:9.5px; padding:2px 6px; border:1px solid var(--border-lt); color:var(--text-dim); letter-spacing:0.5px; }
  .tag.ok{ color:var(--green); border-color:var(--green-dim); }
  .tag.warn{ color:var(--amber); border-color:var(--amber); }
  .tag.bad{ color:var(--red); border-color:var(--red); }

  table.data-tbl{ width:100%; border-collapse:collapse; font-size:11.5px; }
  table.data-tbl th{ text-align:left; color:var(--text-dim); font-weight:500; padding:6px 8px; border-bottom:1px solid var(--border-lt); text-transform:uppercase; font-size:10px; letter-spacing:0.5px; }
  table.data-tbl td{ padding:6px 8px; border-bottom:1px solid var(--border); }
  table.data-tbl tr:hover td{ background:rgba(0,255,140,0.04); }

  /* toast / notifications */
  #toast-stack{
    position:absolute; top:42px; right:18px; z-index:500;
    display:flex; flex-direction:column; gap:8px; align-items:flex-end;
  }
  .toast{
    background:rgba(8,18,14,0.97); border:1px solid var(--green-dim);
    border-left:3px solid var(--green); padding:9px 13px; font-size:11px;
    max-width:280px; box-shadow:0 8px 24px rgba(0,0,0,0.5);
    animation:toast-in .25s ease-out;
  }
  .toast.warn{ border-color:var(--amber); border-left-color:var(--amber); }
  .toast.bad{ border-color:var(--red); border-left-color:var(--red); }
  @keyframes toast-in{ from{ transform:translateX(30px); opacity:0; } to{ transform:translateX(0); opacity:1; } }

  /* context menu (right click desktop) */
  #ctxmenu{
    position:absolute; z-index:600; background:rgba(8,18,14,0.98);
    border:1px solid var(--border-lt); min-width:170px; display:none;
    font-size:11.5px; box-shadow:0 10px 30px rgba(0,0,0,0.6);
  }
  #ctxmenu div{ padding:9px 14px; cursor:pointer; color:var(--text); }
  #ctxmenu div:hover{ background:rgba(0,255,140,0.1); color:var(--green); }

  /* mobile */
  @media (max-width:720px){
    #icons{ flex-direction:row; flex-wrap:wrap; top:auto; bottom:34px; left:0; right:0; justify-content:center; background:rgba(5,10,8,0.92); padding:8px; gap:8px; border-top:1px solid var(--border); max-height:38vh; overflow-y:auto; z-index:200;}
    .icon-btn{ width:64px; }
    .win{ left:4px !important; right:4px; width:auto !important; max-height:54vh !important; top:42px !important; }
    .win-resize{ display:none; }
  }
</style>
</head>
<body>

<!-- BOOT SEQUENCE -->
<div id="boot">
  <div id="boot-text"></div>
  <button id="boot-skip">SKIP [ESC]</button>
</div>

<!-- CRT EFFECTS -->
<div id="crt-overlay"></div>
<div id="crt-vignette"></div>
<div id="crt-flicker"></div>

<!-- DESKTOP -->
<div id="desktop">

  <div id="topbar">
    <div class="brand">NEXUS<span>_OS</span> v3.1</div>
    <div class="right">
      <span><span class="pulse-dot"></span>LINK ESTABLE</span>
      <span class="clock" id="clock">00:00:00</span>
    </div>
  </div>

  <div id="ticker">
    <div id="ticker-inner"></div>
  </div>

  <div id="toast-stack"></div>

  <div id="icons"><!-- icon buttons injected by JS --></div>

  <!-- windows get appended here -->

  <div id="statusbar">
    <div class="stats">
      <span>CPU <span id="cpu-val">12%</span><span class="bar-track"><span class="bar-fill" id="cpu-bar" style="width:12%"></span></span></span>
      <span>RAM <span id="ram-val">34%</span><span class="bar-track"><span class="bar-fill" id="ram-bar" style="width:34%"></span></span></span>
      <span>NET <span id="net-val">2.1 MB/s</span></span>
    </div>
    <div class="taskbar-wins" id="taskbar-wins"></div>
  </div>

</div>

<div id="ctxmenu">
  <div data-act="boot">↻ Reiniciar boot sequence</div>
  <div data-act="sound">🔊 Alternar sonido</div>
  <div data-act="theme">▣ Cambiar tema</div>
</div>

<script>
/* =========================================================================
   NEXUS_OS — core engine: boot, sound, windows, taskbar, stats, easter eggs
   ========================================================================= */

/* ---------- AUDIO ENGINE (WebAudio synth, no external files) ---------- */
const Audio_ = (() => {
  let ctx = null;
  let enabled = true;
  function ensure(){ if(!ctx){ ctx = new (window.AudioContext||window.webkitAudioContext)(); } return ctx; }
  function beep({freq=440, dur=0.08, type='sine', gain=0.05, slideTo=null}={}){
    if(!enabled) return;
    try{
      const c = ensure();
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = type; osc.frequency.value = freq;
      if(slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, c.currentTime+dur);
      g.gain.value = gain;
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
      osc.connect(g); g.connect(c.destination);
      osc.start(); osc.stop(c.currentTime+dur);
    }catch(e){}
  }
  function key(){ beep({freq: 600+Math.random()*500, dur:0.03, type:'square', gain:0.02}); }
  function click(){ beep({freq:880, dur:0.05, type:'square', gain:0.04}); }
  function open(){ beep({freq:220, dur:0.12, type:'sawtooth', gain:0.035, slideTo:440}); }
  function close(){ beep({freq:440, dur:0.12, type:'sawtooth', gain:0.035, slideTo:140}); }
  function error(){ beep({freq:160, dur:0.18, type:'square', gain:0.05}); setTimeout(()=>beep({freq:120,dur:0.18,type:'square',gain:0.05}),120); }
  function success(){ beep({freq:520,dur:0.08,type:'sine',gain:0.04}); setTimeout(()=>beep({freq:780,dur:0.12,type:'sine',gain:0.04}),90); }
  function alarm(){ beep({freq:300,dur:0.25,type:'square',gain:0.06,slideTo:900}); }
  function toggle(){ enabled = !enabled; return enabled; }
  return {key, click, open, close, error, success, alarm, toggle, get enabled(){return enabled;}, set enabled(v){enabled=v;} };
})();

/* ---------- CLOCK + FAKE SYSTEM STATS ---------- */
function pad(n){ return n.toString().padStart(2,'0'); }
function tickClock(){
  const d = new Date();
  document.getElementById('clock').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
setInterval(tickClock, 1000); tickClock();

function tickStats(){
  const cpu = Math.max(4, Math.min(97, 12 + Math.round(Math.sin(Date.now()/4000)*10) + Math.round(Math.random()*14)));
  const ram = Math.max(20, Math.min(92, 34 + Math.round(Math.cos(Date.now()/6000)*8) + Math.round(Math.random()*6)));
  const net = (1.2 + Math.random()*6.5).toFixed(1);
  document.getElementById('cpu-val').textContent = cpu+'%';
  document.getElementById('cpu-bar').style.width = cpu+'%';
  document.getElementById('ram-val').textContent = ram+'%';
  document.getElementById('ram-bar').style.width = ram+'%';
  document.getElementById('net-val').textContent = net+' MB/s';
}
setInterval(tickStats, 1800);

/* ---------- TOASTS ---------- */
function toast(msg, kind=''){
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = 'toast' + (kind? ' '+kind : '');
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .4s, transform .4s'; el.style.opacity='0'; el.style.transform='translateX(30px)'; setTimeout(()=>el.remove(),400); }, 3600);
}

/* ---------- TICKER TEXT ---------- */
const tickerMsgs = [
  'NODE_07 sincronizado','firewall perimetral: OK','sin intrusiones detectadas en las últimas 6h',
  'paquetes entrantes: nominal','cifrado AES-256 activo','latencia promedio 23ms',
  'backup automático completado','sesión segura iniciada','escaneo programado en 04:00:00'
];
document.getElementById('ticker-inner').textContent = tickerMsgs.join('     //     ');

/* ---------- BOOT SEQUENCE ---------- */
const bootLines = [
  'NEXUS_OS BIOS v3.1.4 (c) Anonymous Systems',
  'Detectando hardware...........[ OK ]',
  'CPU: QUANTUM-CORE x8 @ 4.4GHz...[ OK ]',
  'RAM: 32768MB................[ OK ]',
  'Montando /dev/sda1 (root)...[ OK ]',
  'Cargando kernel cifrado......[ OK ]',
  'Inicializando interfaz de red eth0...[ OK ]',
  'Estableciendo túnel VPN multisalto...[ OK ]',
  'Verificando firma digital del sistema...[ OK ]',
  'Cargando módulos de seguridad: firewall, IDS, honeypot...[ OK ]',
  'Descifrando partición de usuario...[ OK ]',
  '',
  'bienvenido, operador.',
  'iniciando entorno de escritorio NEXUS_OS...'
];
let bootIdx = 0, charIdx = 0;
const bootTextEl = document.getElementById('boot-text');
function typeBoot(){
  if(bootIdx >= bootLines.length){ finishBoot(); return; }
  const line = bootLines[bootIdx];
  if(charIdx <= line.length){
    bootTextEl.textContent = bootLines.slice(0,bootIdx).join('\n') + (bootIdx>0?'\n':'') + line.slice(0,charIdx);
    charIdx++;
    if(Math.random()<0.5) Audio_.key();
    setTimeout(typeBoot, 8 + Math.random()*18);
  } else {
    bootIdx++; charIdx = 0;
    setTimeout(typeBoot, 90);
  }
}
function finishBoot(){
  const boot = document.getElementById('boot');
  boot.style.transition = 'opacity .5s';
  boot.style.opacity = '0';
  setTimeout(()=>{ boot.classList.add('hide'); }, 500);
}
document.getElementById('boot-skip').addEventListener('click', finishBoot);
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape' && !document.getElementById('boot').classList.contains('hide')) finishBoot(); });
setTimeout(typeBoot, 400);

/* ---------- WINDOW MANAGER ---------- */
const desktop = document.getElementById('desktop');
const taskbarWins = document.getElementById('taskbar-wins');
let zTop = 100;
const openWindows = {}; // id -> {el, minimized}

function focusWin(id){
  const w = openWindows[id]; if(!w) return;
  zTop += 1;
  w.el.style.zIndex = zTop;
  document.querySelectorAll('.win').forEach(el=>el.classList.remove('focused'));
  w.el.classList.add('focused');
  document.querySelectorAll('.task-chip').forEach(c=>c.classList.remove('active'));
  const chip = document.getElementById('chip-'+id);
  if(chip) chip.classList.add('active');
}

function makeDraggable(win, handle){
  let sx, sy, ox, oy, dragging=false;
  handle.addEventListener('mousedown', startDrag);
  handle.addEventListener('touchstart', startDrag, {passive:false});
  function startDrag(e){
    dragging = true;
    const p = e.touches ? e.touches[0] : e;
    sx = p.clientX; sy = p.clientY;
    const rect = win.getBoundingClientRect();
    const parentRect = desktop.getBoundingClientRect();
    ox = rect.left - parentRect.left; oy = rect.top - parentRect.top;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchmove', onDrag, {passive:false});
    document.addEventListener('touchend', stopDrag);
    e.preventDefault();
  }
  function onDrag(e){
    if(!dragging) return;
    const p = e.touches ? e.touches[0] : e;
    const dx = p.clientX - sx, dy = p.clientY - sy;
    let nx = ox+dx, ny = oy+dy;
    nx = Math.max(-50, Math.min(nx, desktop.clientWidth-60));
    ny = Math.max(0, Math.min(ny, desktop.clientHeight-40));
    win.style.left = nx+'px'; win.style.top = ny+'px';
    e.preventDefault();
  }
  function stopDrag(){
    dragging = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', stopDrag);
  }
}

function makeResizable(win, handle){
  let sx, sy, ow, oh, resizing=false;
  handle.addEventListener('mousedown', start);
  function start(e){
    resizing = true;
    sx = e.clientX; sy = e.clientY;
    ow = win.offsetWidth; oh = win.offsetHeight;
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
    e.preventDefault(); e.stopPropagation();
  }
  function move(e){
    if(!resizing) return;
    const nw = Math.max(280, ow + (e.clientX-sx));
    const nh = Math.max(180, oh + (e.clientY-sy));
    win.style.width = nw+'px'; win.style.height = nh+'px';
  }
  function stop(){ resizing=false; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop); }
}

let cascadeOffset = 0;
function openApp(id, title, glyph, bodyHTML, opts={}){
  if(openWindows[id]){
    openWindows[id].el.classList.remove('minimized');
    openWindows[id].minimized = false;
    focusWin(id);
    updateTaskbar();
    return openWindows[id].el;
  }
  Audio_.open();
  const win = document.createElement('div');
  win.className = 'win focused';
  win.id = 'win-'+id;
  const w = opts.width || 420, h = opts.height || 320;
  cascadeOffset = (cascadeOffset + 1) % 6;
  const left = opts.left ?? (60 + cascadeOffset*26);
  const top = opts.top ?? (50 + cascadeOffset*22);
  win.style.width = w+'px'; win.style.height = h+'px';
  win.style.left = left+'px'; win.style.top = top+'px';
  win.innerHTML = `
    <div class="win-head">
      <div class="title">${glyph} ${title}</div>
      <div class="ctrls">
        <button class="min-btn" title="Minimizar">_</button>
        <button class="close-btn" title="Cerrar">×</button>
      </div>
    </div>
    <div class="win-body">${bodyHTML}</div>
    <div class="win-resize"></div>
  `;
  desktop.appendChild(win);
  openWindows[id] = {el: win, minimized:false, title, glyph};
  win.addEventListener('mousedown', ()=>focusWin(id));
  win.querySelector('.close-btn').addEventListener('click', (e)=>{ e.stopPropagation(); closeApp(id); });
  win.querySelector('.min-btn').addEventListener('click', (e)=>{ e.stopPropagation(); minimizeApp(id); });
  makeDraggable(win, win.querySelector('.win-head'));
  makeResizable(win, win.querySelector('.win-resize'));
  focusWin(id);
  updateTaskbar();
  if(opts.onOpen) opts.onOpen(win);
  return win;
}

function closeApp(id){
  const w = openWindows[id]; if(!w) return;
  Audio_.close();
  if(appRegistry[id] && appRegistry[id].onClose) appRegistry[id].onClose();
  w.el.remove();
  delete openWindows[id];
  updateTaskbar();
}
function minimizeApp(id){
  const w = openWindows[id]; if(!w) return;
  w.el.classList.add('minimized');
  w.minimized = true;
  updateTaskbar();
}
function updateTaskbar(){
  taskbarWins.innerHTML = '';
  Object.keys(openWindows).forEach(id=>{
    const w = openWindows[id];
    const chip = document.createElement('div');
    chip.className = 'task-chip' + (!w.minimized ? ' active':'');
    chip.id = 'chip-'+id;
    chip.textContent = w.glyph + ' ' + w.title;
    chip.addEventListener('click', ()=>{
      if(w.minimized){ w.el.classList.remove('minimized'); w.minimized=false; focusWin(id); }
      else { minimizeApp(id); }
    });
    taskbarWins.appendChild(chip);
  });
}

  let score = 0;
  if(pw.length>=8) score++;
  if(pw.length>=12) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  return Math.min(score,5);
}
function runPassword(win){
  const out = win.querySelector('#pw-out');
  const lenSlider = win.querySelector('#pw-len');
  const lenVal = win.querySelector('#pw-len-val');
  lenSlider.addEventListener('input', ()=> lenVal.textContent = lenSlider.value);
  win.querySelector('#pw-gen').addEventListener('click', ()=>{
    Audio_.click();
    const pw = genPassword(parseInt(lenSlider.value), win.querySelector('#pw-upper').checked, win.querySelector('#pw-num').checked, win.querySelector('#pw-sym').checked);
    out.value = pw;
    toast('Contraseña generada', 'ok');
  });
  win.querySelector('#pw-copy').addEventListener('click', ()=>{
    if(out.value.includes('•')){ toast('Genera una contraseña primero', 'warn'); return; }
    navigator.clipboard?.writeText(out.value).catch(()=>{});
    toast('Copiado al portapapeles');
  });
  const testInput = win.querySelector('#pw-test');
  const bar = win.querySelector('#pw-strength-bar');
  const label = win.querySelector('#pw-strength-label');
  const labels = ['muy débil','débil','aceptable','fuerte','muy fuerte','excelente'];
  const colors = ['#ff3860','#ff3860','#ffb800','#ffb800','#00ff8c','#00ff8c'];
  testInput.addEventListener('input', ()=>{
    const s = pwStrength(testInput.value);
    bar.style.width = (testInput.value? (s/5*100):0)+'%';
    bar.style.background = colors[s];
    label.textContent = testInput.value? `fortaleza: ${labels[s]}` : 'esperando entrada...';
  });
  win.querySelector('#pw-crack').addEventListener('click', ()=>{
    const pw = testInput.value || out.value.replace(/•/g,'');
    if(!pw){ toast('Ingresa o genera una contraseña primero','warn'); return; }
    const timeEl = win.querySelector('#pw-crack-time');
    timeEl.textContent = 'calculando...';
    Audio_.alarm();
    setTimeout(()=>{
      const s = pwStrength(pw);
      const estimates = ['segundos','minutos','horas','días','años','siglos'];
      timeEl.textContent = `tiempo estimado de fuerza bruta: ~${Math.floor(Math.random()*900)+1} ${estimates[s]}`;
      Audio_.success();
    }, 900);
  });
}

/* =========================================================================

function matrixBody(){
  return `<canvas id="matrix-canvas" style="width:100%; height:100%; display:block; background:#000;"></canvas>`;
}
function runMatrixApp(win){
  const cv = win.querySelector('#matrix-canvas');
  const c = cv.getContext('2d');
  function resize(){ cv.width = win.querySelector('.win-body').clientWidth; cv.height = win.querySelector('.win-body').clientHeight; }
  resize();
  const chars = 'アイウエオカキクケコサシスセソ0123456789NEXUS_OS';
  let drops = new Array(Math.floor(cv.width/14)).fill(0);
  const iv = setInterval(()=>{
    c.fillStyle = 'rgba(0,0,0,0.08)'; c.fillRect(0,0,cv.width,cv.height);
    c.fillStyle = '#00ff8c'; c.font='14px monospace';
    drops.forEach((y,i)=>{
      c.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, y*14);
      drops[i] = (y*14>cv.height && Math.random()>0.975) ? 0 : y+1;
    });
  }, 40);
  appRegistry.matrix._intervals = [iv];
  window.addEventListener('resize', resize);
}

function runMiner(win){
  let mining = false, balance = 0, blocks = 0, iv = null;
  const log = win.querySelector('#miner-log');
  const tag = win.querySelector('#miner-tag');
  const hashEl = win.querySelector('#miner-hash');
  const blocksEl = win.querySelector('#miner-blocks');
  const balEl = win.querySelector('#miner-balance');
  const btn = win.querySelector('#miner-toggle');
  function line(t){ log.textContent += t+'\n'; log.scrollTop = log.scrollHeight; }
  btn.addEventListener('click', ()=>{
    mining = !mining;
    if(mining){
      btn.textContent = '■ DETENER MINERÍA';
      tag.textContent = 'MINANDO'; tag.className='tag warn';
      line('inicializando GPU virtual... OK');
      Audio_.open();
      iv = setInterval(()=>{
        const hash = (200+Math.random()*800).toFixed(1);
        hashEl.textContent = hash+' kH/s';
        if(Math.random()<0.18){
          blocks++; balance += Math.random()*0.00002;
          blocksEl.textContent = blocks;
          balEl.textContent = balance.toFixed(8)+' BTC';
          line(`bloque #${1000000+blocks} encontrado — nonce 0x${Math.floor(Math.random()*99999).toString(16)}`);
          Audio_.success();
        }
      }, 700);
    } else {
      btn.textContent = '▶ INICIAR MINERÍA';
      tag.textContent = 'DETENIDO'; tag.className='tag ok';
      hashEl.textContent = '0 H/s';
      line('minería detenida por el operador.');
      clearInterval(iv);
      Audio_.close();
    }
  });
  appRegistry.miner.onClose = ()=>{ if(iv) clearInterval(iv); };
}

function attackMapBody(){
  return `
    <div class="row" style="justify-content:space-between;">
      <div class="label-sm">Monitoreo global de amenazas</div>
      <span class="tag bad" id="atk-tag">EN VIVO</span>
    </div>
    <svg id="atk-svg" viewBox="0 0 600 300" style="width:100%; height:200px; margin-top:8px; background:radial-gradient(ellipse at center, rgba(0,255,140,0.04), transparent 70%);">
      <g id="atk-dots"></g>
      <g id="atk-lines"></g>
    </svg>
    <div class="mono-block" id="atk-log" style="height:110px; margin-top:8px;"></div>
    <table class="data-tbl" style="margin-top:8px;">
      <thead><tr><th>Tipo</th><th>Origen</th><th>Destino</th><th>Severidad</th></tr></thead>
      <tbody id="atk-tbody"></tbody>
    </table>
  `;
}
const attackTypes = ['DDoS','SQL Injection','Brute Force','Port Scan','Ransomware','Phishing','Zero-Day'];
const countries = ['RU','CN','US','BR','DE','IN','KR','NG','FR','VN','CO','MX'];
function runAttackMap(win){
  const dotsG = win.querySelector('#atk-dots');
  const linesG = win.querySelector('#atk-lines');
  const log = win.querySelector('#atk-log');
  const tbody = win.querySelector('#atk-tbody');
  function rnd(max){ return Math.random()*max; }
  const iv = setInterval(()=>{
    const x1=rnd(600), y1=rnd(300), x2=rnd(600), y2=rnd(300);
    const type = attackTypes[Math.floor(Math.random()*attackTypes.length)];
    const from = countries[Math.floor(Math.random()*countries.length)];
    const to = countries[Math.floor(Math.random()*countries.length)];
    const sev = ['baja','media','alta','crítica'][Math.floor(Math.random()*4)];
    const sevColor = {baja:'#00ff8c',media:'#ffb800',alta:'#ff3860',crítica:'#ff3860'}[sev];

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke', sevColor); line.setAttribute('stroke-width','1'); line.setAttribute('opacity','0.6');
    linesG.appendChild(line);

    [[x1,y1],[x2,y2]].forEach(([x,y])=>{
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',x); dot.setAttribute('cy',y); dot.setAttribute('r','3'); dot.setAttribute('fill', sevColor);
      dotsG.appendChild(dot);
      setTimeout(()=>dot.remove(), 2500);
    });
    setTimeout(()=>line.remove(), 2500);

    log.textContent = `[${new Date().toLocaleTimeString()}] ${type} detectado: ${from} → ${to} (severidad: ${sev})\n` + log.textContent;
    log.textContent = log.textContent.split('\n').slice(0,8).join('\n');

    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${type}</td><td>${from}</td><td>${to}</td><td><span class="tag" style="color:${sevColor}; border-color:${sevColor};">${sev}</span></td>`;
    tbody.prepend(tr);
    while(tbody.children.length>6) tbody.lastChild.remove();
    if(sev==='crítica' && Math.random()<0.4) Audio_.alarm();
  }, 1100);
  appRegistry.attackmap._intervals = [iv];
}
